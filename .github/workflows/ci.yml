name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit tests (Vitest — Dashboard routing guards)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Run Vitest (includes Dashboard.test.tsx super-admin regression guard)
        run: npm test -- --run

  supabase-integration-tests:
    name: Supabase integration tests (Deno — RLS / has_role / is_super_admin)
    runs-on: ubuntu-latest
    # Skip on forks / when secrets are unavailable to avoid noisy failures.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
      TEST_ADMIN_PASS: ${{ secrets.TEST_ADMIN_PASS }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: Guard — required secrets present
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "❌ Missing SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY / SUPABASE_ANON_KEY repo secrets."
            echo "   Add them in GitHub → Settings → Secrets → Actions so RLS regressions are caught in CI."
            exit 1
          fi
      - name: Role access tests (has_role / is_super_admin / user_roles RLS)
        run: deno test --allow-net --allow-env --allow-read supabase/functions/qr-pay/role_access_test.ts
      - name: Role edge-case tests (empty user_roles + transient DB errors)
        run: deno test --allow-net --allow-env --allow-read supabase/functions/qr-pay/role_edge_cases_test.ts
      - name: Transaction limits tests
        run: deno test --allow-net --allow-env --allow-read supabase/functions/qr-pay/limits_test.ts

  e2e-tests:
    name: E2E tests (Playwright — super admin never lands on customer view)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      E2E_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
      E2E_ADMIN_PASS: ${{ secrets.TEST_ADMIN_PASS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Install Playwright browsers
        run: npx --yes playwright@1.47.0 install --with-deps chromium
      - name: Build app
        run: npm run build
      - name: Run E2E (admin routing scenarios)
        run: npx --yes playwright@1.47.0 test e2e/admin-routing.spec.ts --config=e2e/playwright.config.ts
      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/test-results
            e2e/playwright-report
          if-no-files-found: ignore
